# =============================================================================
# Sentinel - Full Stack
# Usage: docker compose up -d
# =============================================================================
#
# After starting, add these to your existing stack:
#
# prometheus.yml — add one block:
#   remote_write:
#     - url: http://sentinel:9000/ingest
#
# Grafana — add one scrape target:
#   scrape_configs:
#     - job_name: sentinel
#       static_configs:
#         - targets: ['sentinel:9001']
#
# =============================================================================

services:

  sentinel:
    build: .
    ports:
      - "9000:9000"   # POST /ingest  — Prometheus remote_write target
      - "9001:9001"   # GET  /metrics — Grafana scrape target
    volumes:
      - ./snapshots:/app/snapshots
      - ./artifacts:/app/artifacts
      - ./sentinel.yaml:/app/sentinel.yaml
    env_file:
      - .env
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --backend-store-uri /mlruns
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s