name: latency-spikes
version: 1.0.0
description: "Predicts HTTP latency spikes 10 minutes ahead using sliding window features"

requires:
  metrics:
    - http_request_duration_seconds
    - http_requests_total
  min_history: 2h

wait:
  strategy: both
  time_hours: 6
  rows: 10000

retrain:
  schedule: "0 2 * * *"
  min_rows: 10000

inference:
  interval_seconds: 60
  timeout_seconds: 30
  fallback: continue_old

outputs:
  - name: failure_probability
    type: probability
    horizon_seconds: 600