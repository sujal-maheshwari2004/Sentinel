# =============================================================================
# Sentinel - Dev Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# =============================================================================
# Differences from production:
#   - Hot reload enabled on code changes
#   - Full source mounted into container so edits reflect immediately
#   - Build targets builder stage (has dev deps)
# =============================================================================

services:
  sentinel:
    build:
      context: .
      target: builder
    command: uvicorn core.ingestion.server:app --host 0.0.0.0 --port 9000 --reload
    volumes:
      - .:/app   # mount full source so hot reload picks up changes